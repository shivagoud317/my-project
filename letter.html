<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CampusConnect</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .letter-content {
      white-space: pre-wrap;
      font-family: inherit;
      padding: 15px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin: 20px 0;
      min-height: 150px;
    }

    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .btn-approve {
      background-color: #16a34a;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-reject {
      background-color: #dc2626;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <header class="main-header">
    <div class="header-left">
      <span class="logo">🎓</span>
      <h1 class="site-name">CampusConnect</h1>
    </div>
    <div class="header-center">
      <h2 class="page-title">Review Permission Request</h2>
    </div>
    <div class="header-right">
      <button onclick="window.location.href='pending.html'">Back to Pending</button>
    </div>
  </header>

  <section>
    <div class="registrations-card" style="margin: 20px; max-width: 800px; margin-left: auto; margin-right: auto;">
      <div id="loadingStatus">Loading request details...</div>

      <div id="requestDetails" style="display: none;">
        <h3 id="eventNameDisplay" style="color: #2563eb; margin-bottom: 5px;">Event Name</h3>
        <p style="margin-top: 0;"><strong>Student:</strong> <span id="studentNameDisplay"></span></p>
        <p><strong>Status:</strong> <span id="statusDisplay" style="color: #f59e0b; font-weight: bold;">Pending</span>
        </p>

        <h4>Permission Letter:</h4>
        <div id="letterContentDisplay" class="letter-content"></div>

        <div class="action-buttons">
          <button id="approveBtn" class="btn-approve">Approve</button>
          <button id="rejectBtn" class="btn-reject">Reject</button>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="js/letter.js"></script>
</body>

</html>
