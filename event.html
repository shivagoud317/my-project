<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CampusConnect</title>
    <link rel="stylesheet" href="css/admin.css" />
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="main-header">
        <div class="header-left">
            <span class="logo">🎓</span>
            <h1 class="site-name">CampusConnect</h1>
        </div>
        <div class="header-center">
            <h2 class="page-title" id="headerGreeting">Events Board</h2>
        </div>
        <div class="header-right">
            <p id="studentEmail"></p>
            <button type="button" id="dashboardBtn">Back to Dashboard</button>
            <button type="button" id="logoutBtn" style="background:#ef4444; color:white;">Logout</button>
        </div>
    </header>

    <!-- ================= EVENTS ================= -->
    <div id="eventsSection" style="padding: 20px;">
        <section>
            <h3>Upcoming Events</h3>
            <div id="upcomingEventsList" class="grid" style="margin-bottom: 25px;"></div>
        </section>

        <section>
            <h3>Completed Events</h3>
            <div id="completedEventsList" class="grid"></div>
        </section>
    </div>

    <!-- ================= EVENT MODAL ================= -->
    <div id="eventModalBackdrop" class="modal-backdrop" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="eventModalTitle"></h3>
                <button id="closeModalBtn" onclick="closeEventModal()">×</button>
            </div>
            <div id="eventModalBody" class="modal-body"></div>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script type="module" src="js/student.js"></script>

</body>

</html>
